<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynkCoder — Software, synchronized.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #080B10;
  --accent:        #00E57A;
  --accent-soft:   rgba(0, 229, 122, 0.10);
  --accent-border: rgba(0, 229, 122, 0.28);
  --text-1:        #E8F0FF;
  --text-2:        #8B9BB4;
  --border-2:      rgba(139, 155, 180, 0.18);
}

html, body {
  height: 100%;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--text-1);
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  overflow: hidden;
  padding: 60px clamp(20px, 6vw, 80px);
}

.hero-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,122,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,122,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
}

.hero-glow {
  position: absolute;
  width: min(640px, 100vw);
  height: min(640px, 100vw);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,122,0.06) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

.hero-logo-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(10px, 2.5vw, 22px);
  opacity: 0;
  animation: fadeUp 0.75s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}

.hero-wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(28px, 9vw, 82px);
  color: var(--text-1);
  letter-spacing: -0.03em;
  line-height: 1;
}
.hero-wordmark span { color: var(--accent); }

.hero-logo-wrapper svg path,
.hero-logo-wrapper svg line {
  stroke-dasharray: 120;
  stroke-dashoffset: 120;
  animation: draw 0.9s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
}
.hero-logo-wrapper svg line { animation-delay: 0.52s; }

.hero-tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(13px, 2.5vw, 17px);
  color: var(--text-2);
  letter-spacing: 0.06em;
  opacity: 0;
  animation: fadeUp 0.75s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

.badge-group {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  max-width: 600px;
  opacity: 0;
  animation: fadeUp 0.75s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
}

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 100px;
  border: 1px solid var(--border-2);
  color: var(--text-2);
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.badge.accent {
  border-color: var(--accent-border);
  color: var(--accent);
  background: var(--accent-soft);
}

.badge-divider {
  width: 100%;
  height: 1px;
  background: rgba(139,155,180,0.08);
  margin: 4px 0;
  opacity: 0;
  animation: fadeIn 0.5s ease 0.65s forwards;
}

.tech-group {
  animation-delay: 0.68s !important;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes draw {
  from { stroke-dashoffset: 120; opacity: 0; }
  to   { stroke-dashoffset: 0;   opacity: 1; }
}

@media (max-width: 480px) {
  .hero { padding: 48px 20px; }
  .hero-content { gap: 20px; }
  .badge { font-size: 10px; padding: 5px 11px; }
}
@media (max-width: 360px) {
  .hero-logo-wrapper { flex-direction: column; gap: 12px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-grid-bg"></div>
  <div class="hero-glow"></div>

  <div class="hero-content">

    <div class="hero-logo-wrapper">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"
           style="width:clamp(32px,8vw,72px);height:clamp(32px,8vw,72px);flex-shrink:0">
        <path d="M14 16 L44 36 L14 56" stroke="#00E57A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="50" y1="56" x2="64" y2="56" stroke="#00E57A" stroke-width="5.5" stroke-linecap="round"/>
      </svg>
      <div class="hero-wordmark">Synk<span>Coder</span></div>
    </div>

    <p class="hero-tagline">// Software, synchronized.</p>

    <div class="badge-group">
      <span class="badge accent">Classe 42 — INPI</span>
      <span class="badge">Softhouse</span>
      <span class="badge">Desenvolvimento de Software</span>
      <span class="badge">Consultoria em TI</span>
    </div>



  </div>
</div>

</body>
</html>
